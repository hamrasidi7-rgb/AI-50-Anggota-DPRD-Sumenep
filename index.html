<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #app { height: 100%; }
    body { font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    .scroll-y::-webkit-scrollbar { width: 8px; }
    .scroll-y::-webkit-scrollbar-thumb { background: rgba(120,140,170,.30); border-radius: 8px; }
    .scroll-y::-webkit-scrollbar-track { background: transparent; }

    .no-scrollbar { scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    select { -webkit-appearance: none; appearance: none; }
    select option { color: #0B2540; }

    ::placeholder { color: rgba(231,240,255,.55); }
    .chat-input::placeholder { color: #94A3B8; }

    /* Slider card hover */
    .slider-card {
      transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease;
      cursor: pointer;
    }
    .slider-card:hover {
      transform: translateY(-7px) scale(1.02);
      border-color: rgba(212,175,55,.6) !important;
      box-shadow: 0 34px 74px -28px rgba(212,175,55,.34) !important;
    }

    /* Grid card hover */
    .grid-card {
      transition: transform .24s ease, border-color .24s ease, background .24s ease;
      cursor: pointer;
    }
    .grid-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212,175,55,.6) !important;
      background: rgba(255,255,255,.09) !important;
    }
    .grid-cta {
      transition: background .2s ease, color .2s ease, border-color .2s ease;
      cursor: pointer;
    }
    .grid-cta:hover {
      background: linear-gradient(135deg,#D4AF37,#C49B2A) !important;
      color: #06223f !important;
      border-color: transparent !important;
    }

    /* Responsive: container-width based (standard CSS media queries) */
    @media (min-width: 1100px) {
      .r-hpad  { padding-left: 48px; padding-right: 48px; }
      .r-h1    { font-size: 44px; }
      .r-h2    { font-size: 24px; }
      .r-sub   { font-size: 18px; }
      .r-search{ height: 66px; }
      .r-grid  { grid-template-columns: repeat(4,minmax(0,1fr)); gap: 20px; }
      .r-info  { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .r-card  { width: 300px; }
      .r-av    { width: 112px; height: 112px; font-size: 27px; }
      .r-chpad { padding-left: 32px; padding-right: 32px; }
    }
    @media (min-width: 760px) and (max-width: 1099px) {
      .r-hpad  { padding-left: 32px; padding-right: 32px; }
      .r-h1    { font-size: 34px; }
      .r-h2    { font-size: 22px; }
      .r-sub   { font-size: 17px; }
      .r-search{ height: 62px; }
      .r-grid  { grid-template-columns: repeat(3,minmax(0,1fr)); gap: 16px; }
      .r-info  { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .r-card  { width: 280px; }
      .r-av    { width: 104px; height: 104px; font-size: 24px; }
      .r-chpad { padding-left: 28px; padding-right: 28px; }
    }
    @media (max-width: 759px) {
      .r-hpad  { padding-left: 18px; padding-right: 18px; }
      .r-h1    { font-size: 26px; }
      .r-h2    { font-size: 19px; }
      .r-sub   { font-size: 15px; }
      .r-search{ height: 54px; }
      .r-grid  { grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
      .r-info  { grid-template-columns: repeat(1,minmax(0,1fr)); }
      .r-card  { width: 228px; }
      .r-av    { width: 90px; height: 90px; font-size: 20px; }
      .r-chpad { padding-left: 16px; padding-right: 16px; }
    }

function initials(name) {
  const p = name.replace(/\./g,'').split(' ').filter(Boolean);
  return ((p[0][0]||'') + (p[1] ? p[1][0] : (p[0][1]||''))).toUpperCase();
}

function esc(s) {

// ─── MOUNT / UNMOUNT ─────────────────────────────────────────────────────────

function mount() {
  const app = document.getElementById('app');
  if (S.view === 'home') {
    app.innerHTML = renderHome();
    bindHome();
    startSlider();
  } else {
    stopSlider();
    app.innerHTML = renderChat();
    bindChat();
    scrollBottom();
  }
}

// ─── HOME BINDINGS ────────────────────────────────────────────────────────────

function bindHome() {
  document.getElementById('q-input').addEventListener('input', e => {
    S.q = e.target.value;
    S.slide = 0;
    updateGrid();
  });

  document.getElementById('f-fraksi').addEventListener('change', e => { S.fraksi = e.target.value; updateGrid(); });
  document.getElementById('f-komisi').addEventListener('change', e => { S.komisi = e.target.value; updateGrid(); });
  document.getElementById('f-dapil').addEventListener('change',  e => { S.dapil  = e.target.value; updateGrid(); });

  document.getElementById('btn-reset').addEventListener('click', () => {
    S.q = ''; S.fraksi = ''; S.komisi = ''; S.dapil = '';
    S.slide = 0;
    mount();
  });

  const sliderSec = document.getElementById('slider-section');
  sliderSec.addEventListener('mouseenter', () => { S.paused = true; });
  sliderSec.addEventListener('mouseleave', () => { S.paused = false; });

  bindCards();
}

function bindCards() {
  document.querySelectorAll('.slider-card[data-id]').forEach(el => {
    el.addEventListener('click', () => openChat(+el.dataset.id));
  });
  document.querySelectorAll('.grid-card[data-id]').forEach(el => {
    el.addEventListener('click', () => openChat(+el.dataset.id));
  });
}

function updateGrid() {
  const list = filtered();
  const grid = document.getElementById('member-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');
  if (!grid) return;
  grid.innerHTML = list.map(m => gridCardHTML(m)).join('');
  empty.style.display = list.length === 0 ? 'block' : 'none';
  count.textContent = `${list.length} dari 50 anggota`;
  document.querySelectorAll('.grid-card[data-id]').forEach(el => {
    el.addEventListener('click', () => openChat(+el.dataset.id));
  });
}

// ─── CHAT BINDINGS ────────────────────────────────────────────────────────────

function bindChat() {
  document.getElementById('back-btn').addEventListener('click', () => {
    S.view = 'home';
    mount();
  });

  const inp = document.getElementById('chat-input');
  inp.addEventListener('input', e => { S.input = e.target.value; });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  document.getElementById('send-btn').addEventListener('click', send);
  inp.focus();
}

function send() {
  const text = (S.input || '').trim();
  if (!text) return;

  S.messages.push({ role: 'user', text });
  S.input = '';

  const am = activeMember();
  const inner = document.getElementById('chat-inner');
  inner.insertAdjacentHTML('beforeend', msgHTML({ role: 'user', text }, am));
  document.getElementById('chat-input').value = '';
  scrollBottom();

  clearTimeout(S.replyTimer);
  S.replyTimer = setTimeout(() => {
    const userCount = S.messages.filter(m => m.role === 'user').length;
    const idx = (userCount - 1) % REPLIES.length;
    let reply = REPLIES[idx]
      .replace(/\{komisi\}/g, am.komisi)
      .replace(/\{dapil\}/g, am.dapil)
      .replace(/\{name\}/g, am.name);
    S.messages.push({ role: 'persona', text: reply });
    inner.insertAdjacentHTML('beforeend', msgHTML({ role: 'persona', text: reply }, am));
    scrollBottom();
  }, 700);
}

function scrollBottom() {
  setTimeout(() => {
    const el = document.getElementById('chat-scroll');
    if (el) el.scrollTop = el.scrollHeight;
  }, 60);
}

function openChat(id) {
  S.view = 'chat';
  S.activeMemberId = id;
  S.messages = [{ role: 'persona', text: INTRO }];
  S.input = '';
  mount();
}

// ─── SLIDER ───────────────────────────────────────────────────────────────────

function startSlider() {
  stopSlider();
  S.timer = setInterval(() => {
    if (S.view !== 'home' || S.paused) return;
    const px = cardPx();
    const visible = Math.max(1, Math.floor(window.innerWidth / (px + 18)));
    const max = Math.max(0, SOROTAN.length - visible);
    if (max <= 0) return;
    S.slide = S.slide >= max ? 0 : S.slide + 1;
    const track = document.getElementById('slider-track');
    if (track) track.style.transform = `translateX(-${S.slide * (px + 18)}px)`;
  }, 3600);
}

function stopSlider() {
  if (S.timer) { clearInterval(S.timer); S.timer = null; }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

mount();
</script>
